AWSTemplateFormatVersion: '2010-09-09'
Description: Security groups following least-privilege principles for ECS CI/CD

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  ContainerPort:
    Type: Number
    Default: 8080

Resources:
  # ── ALB security group ────────────────────────────────────────────────────────
  # Allows inbound HTTP from the internet; all outbound to ECS tasks only.
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from internet to ALB
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Test listener for blue/green deployments
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alb-sg
        - Key: Project
          Value: !Ref ProjectName

  # ── ECS task security group ───────────────────────────────────────────────────
  # Only accepts traffic from the ALB; no direct inbound from internet.
  ECSTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB to ECS tasks only
      VpcId: !ImportValue
        Fn::Sub: ${ProjectName}-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Traffic from ALB only
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ecs-task-sg
        - Key: Project
          Value: !Ref ProjectName

  # Restrict ALB egress to ECS tasks only
  ALBEgressToECS:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      DestinationSecurityGroupId: !Ref ECSTaskSecurityGroup
      Description: ALB to ECS tasks

Outputs:
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-ALBSecurityGroupId

  ECSTaskSecurityGroupId:
    Value: !Ref ECSTaskSecurityGroup
    Export:
      Name: !Sub ${ProjectName}-ECSTaskSecurityGroupId
