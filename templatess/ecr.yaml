AWSTemplateFormatVersion: '2010-09-09'
Description: ECR repository with immutable tags and lifecycle policy

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  GitHubOrg:
    Type: String
    Description: GitHub organisation or username that owns the application repo
  GitHubRepo:
    Type: String
    Description: Application repository name (app code repo)

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}/app
      ImageTagMutability: IMMUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ecr
        - Key: Project
          Value: !Ref ProjectName

  # ── IAM role that GitHub Actions assumes via OIDC ─────────────────────────────
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-github-actions-role
      AssumeRolePolicyDocument: # Only entities authenticating via that GitHub OIDC provider can assume this role
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com # ARN is deterministic; provider already exists in account
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      Policies:
        - PolicyName: ECRPushPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability  # Check if layers already exist before uploading
                  - ecr:GetDownloadUrlForLayer       # Get URL to download an image layer
                  - ecr:GetRepositoryPolicy          # Read the repo's resource policy
                  - ecr:DescribeRepositories         # Get repo metadata (URI, ARN, etc.)
                  - ecr:ListImages                   # List image tags/digests in the repo
                  - ecr:DescribeImages               # Get details about specific images
                  - ecr:BatchGetImage                # Fetch an image's manifest (pull)
                  - ecr:InitiateLayerUpload          # Start uploading a new image layer
                  - ecr:UploadLayerPart              # Upload a chunk of layer data
                  - ecr:CompleteLayerUpload          # Finalize an uploaded layer
                  - ecr:PutImage                     # Publish the image tag/manifest (push)
                Resource: !GetAtt ECRRepository.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketVersioning
                Resource: # CodePipeline artifact bucket
                  - !Sub arn:aws:s3:::${ProjectName}-pipeline-artifacts-${AWS::AccountId}
                  - !Sub arn:aws:s3:::${ProjectName}-pipeline-artifacts-${AWS::AccountId}/*
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  ECRRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub ${ProjectName}-ECRRepositoryUri

  ECRRepositoryArn:
    Value: !GetAtt ECRRepository.Arn
    Export:
      Name: !Sub ${ProjectName}-ECRRepositoryArn

  ECRRepositoryName:
    Value: !Ref ECRRepository
    Export:
      Name: !Sub ${ProjectName}-ECRRepositoryName

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub ${ProjectName}-GitHubActionsRoleArn
