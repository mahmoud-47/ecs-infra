AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline (ECR source + CodeDeploy blue/green) and EventBridge trigger

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  GitHubOrg:
    Type: String
    Description: GitHub organisation or username
  GitHubAppRepo:
    Type: String
    Description: Application repository name
  GitHubBranch:
    Type: String
    Default: main

Resources:

  # Staging area where pipeline stages exchange files (imageDetail.json, appspec.yaml, taskdef.json)
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-pipeline-artifacts-${AWS::AccountId} # account ID ensures global uniqueness
      VersioningConfiguration:
        Status: Enabled # required by CodePipeline to track artifact revisions
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30 # auto-delete old pipeline run artifacts to save cost
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Authorised OAuth link between AWS and GitHub; lets CodePipeline pull files from the app repo without stored secrets
  # NOTE: after stack creation you must authorise this connection in the
  #       AWS Console → Developer Tools → Connections before the pipeline runs.
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub ${ProjectName}-github
      ProviderType: GitHub
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Logical namespace that groups deployment groups under one project in CodeDeploy
  CodeDeployApp:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-app
      ComputePlatform: ECS # locks this to ECS-specific deployment behaviour; cannot be changed after creation

  # Defines how deployments happen: blue/green strategy, traffic shift timing, and which ECS service and ALB listeners to manage
  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApp
      DeploymentGroupName: !Sub ${ProjectName}-dg
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce # shifts 100% of traffic in one step
      DeploymentStyle:
        DeploymentOption: WITH_TRAFFIC_CONTROL # ALB listener rules handle the traffic shift
        DeploymentType: BLUE_GREEN
      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT # shift traffic immediately, no manual approval
          WaitTimeInMinutes: 0
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5 # keeps blue tasks alive for 5 min as a rollback window
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - ProdTrafficRoute: # listener serving real user traffic (port 80)
              ListenerArns:
                - !ImportValue
                    Fn::Sub: ${ProjectName}-ProductionListenerArn
            TestTrafficRoute: # listener used to validate green before traffic shifts (port 8080)
              ListenerArns:
                - !ImportValue
                    Fn::Sub: ${ProjectName}-TestListenerArn
            TargetGroups:
              - Name: !Sub ${ProjectName}-blue-tg
              - Name: !Sub ${ProjectName}-green-tg
      ECSServices:
        - ClusterName: !ImportValue
            Fn::Sub: ${ProjectName}-ECSClusterName
          ServiceName: !ImportValue
            Fn::Sub: ${ProjectName}-ECSServiceName

  # Orchestrates the full flow: pulls the new image and deployment files, then hands off to CodeDeploy
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      Variables:
        - Name: IMAGE_TAG
          Description: ECR image SHA tag captured from the EventBridge push event
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      PipelineType: V2 # V2 required for ECR as a native source action
      Stages:
        # Source 1: ECR image push → imageDetail.json
        # Source 2: GitHub app repo → appspec.yaml + taskdef.json
        - Name: Source
          Actions:
            - Name: ECRSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: ECR
                Version: '1'
              Configuration:
                RepositoryName: !ImportValue
                  Fn::Sub: ${ProjectName}-ECRRepositoryName
                ImageTag: "#{variables.IMAGE_TAG}"
                DetectChanges: 'false'
              OutputArtifacts:
                - Name: ECRSourceOutput
              RunOrder: 1 # same RunOrder as GitHubSource so both run in parallel

            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Sub ${GitHubOrg}/${GitHubAppRepo}
                BranchName: !Ref GitHubBranch
                DetectChanges: 'false' # pipeline must only trigger from ECR pushes, not GitHub commits
              OutputArtifacts:
                - Name: GitHubSourceOutput
              RunOrder: 1

        # Deploy via CodeDeploy ECS blue/green
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApp
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
                TaskDefinitionTemplateArtifact: GitHubSourceOutput
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: GitHubSourceOutput
                AppSpecTemplatePath: appspec.yaml
                Image1ArtifactName: ECRSourceOutput
                Image1ContainerName: IMAGE1_NAME # placeholder in taskdef.json replaced with the real image URI
              InputArtifacts:
                - Name: ECRSourceOutput
                - Name: GitHubSourceOutput
              RunOrder: 1

      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Watches ECR for new image pushes and automatically fires the pipeline; removes the need for manual triggers
  ECRPushEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-ecr-push-trigger
      Description: Trigger CodePipeline when a new image is pushed to ECR
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS # ignore failed or partial pushes
          repository-name:
            - !ImportValue
                Fn::Sub: ${ProjectName}-ECRRepositoryName
      State: ENABLED
      Targets:
        - Id: StartPipeline
          Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              imageTag: "$.detail.image-tag"
            InputTemplate: '{"variables":[{"name":"IMAGE_TAG","value":"<imageTag>"}]}'

  # Grants CodePipeline the permissions it needs to read artifacts, pull from GitHub, and trigger CodeDeploy
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - ecr:DescribeImages
                  - ecr:GetAuthorizationToken
                Resource: '*' # GetAuthorizationToken does not support resource-level scoping
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole # required to attach IAM roles when registering a new task definition
                Resource:
                  - !ImportValue
                      Fn::Sub: ${ProjectName}-TaskDefinitionArn
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-task-execution-role
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-task-role
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Grants CodeDeploy the permissions it needs to update ECS services and shift ALB traffic
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS # AWS-managed policy covering all ECS blue/green permissions
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Grants EventBridge the single permission it needs to start the pipeline when an ECR event matches
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline} # scoped to this pipeline only
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: !Sub ${ProjectName}-PipelineName

  ArtifactBucketName:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub ${ProjectName}-ArtifactBucketName

  GitHubConnectionArn:
    Value: !Ref GitHubConnection
    Description: Authorise this connection in the AWS Console before the pipeline can run
