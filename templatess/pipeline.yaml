AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline (S3 source + CodeDeploy blue/green) and EventBridge trigger

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  GitHubOrg:
    Type: String
    Description: GitHub organisation or username
  GitHubAppRepo:
    Type: String
    Description: Application repository name
  GitHubBranch:
    Type: String
    Default: main

Resources:

  # Receives deployment-bundle.zip (imageDetail.json + appspec.yaml + taskdef.json) from GitHub Actions
  # and also stores pipeline stage artifacts
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-pipeline-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true # required for EventBridge to receive S3 Object Created events
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Kept so the GitHub connection in the AWS console is preserved; not used by the pipeline stages
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub ${ProjectName}-github
      ProviderType: GitHub
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Logical namespace that groups deployment groups under one project in CodeDeploy
  CodeDeployApp:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-app
      ComputePlatform: ECS

  # Blue/green strategy: shifts 100 % of traffic at once, rolls back by keeping blue tasks alive 5 min
  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApp
      DeploymentGroupName: !Sub ${ProjectName}-dg
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentOption: WITH_TRAFFIC_CONTROL
        DeploymentType: BLUE_GREEN
      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - ProdTrafficRoute:
              ListenerArns:
                - !ImportValue
                    Fn::Sub: ${ProjectName}-ProductionListenerArn
            TestTrafficRoute:
              ListenerArns:
                - !ImportValue
                    Fn::Sub: ${ProjectName}-TestListenerArn
            TargetGroups:
              - Name: !Sub ${ProjectName}-blue-tg
              - Name: !Sub ${ProjectName}-green-tg
      ECSServices:
        - ClusterName: !ImportValue
            Fn::Sub: ${ProjectName}-ECSClusterName
          ServiceName: !ImportValue
            Fn::Sub: ${ProjectName}-ECSServiceName

  # Reads the deployment bundle uploaded to S3 and drives CodeDeploy blue/green
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      PipelineType: V2
      Stages:
        # GitHub Actions builds the image, writes imageDetail.json with the SHA URI, zips everything,
        # and uploads to S3 — that upload triggers EventBridge which starts this pipeline
        - Name: Source
          Actions:
            - Name: S3Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: deployment-bundle.zip
                PollForSourceChanges: 'false' # EventBridge handles the trigger; polling is disabled
              OutputArtifacts:
                - Name: DeploymentBundle
              RunOrder: 1

        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApp
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
                TaskDefinitionTemplateArtifact: DeploymentBundle
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: DeploymentBundle
                AppSpecTemplatePath: appspec.yaml
                Image1ArtifactName: DeploymentBundle
                Image1ContainerName: IMAGE1_NAME # matches <IMAGE1_NAME> placeholder in taskdef.json
              InputArtifacts:
                - Name: DeploymentBundle
              RunOrder: 1

      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Fires the pipeline whenever deployment-bundle.zip lands in the artifact bucket
  S3DeployTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-s3-deploy-trigger
      Description: Trigger CodePipeline when deployment-bundle.zip is uploaded to the artifact bucket
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref ArtifactBucket
          object:
            key:
              - deployment-bundle.zip
      State: ENABLED
      Targets:
        - Id: StartPipeline
          Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
          RoleArn: !GetAtt EventBridgeRole.Arn

  # Grants CodePipeline the permissions it needs to read artifacts and trigger CodeDeploy
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:RegisterApplicationRevision
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !ImportValue
                      Fn::Sub: ${ProjectName}-TaskDefinitionArn
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-task-execution-role
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-task-role
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Grants CodeDeploy the permissions it needs to update ECS services and shift ALB traffic
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Grants EventBridge the single permission it needs to start the pipeline when the S3 bundle lands
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: !Sub ${ProjectName}-PipelineName

  ArtifactBucketName:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub ${ProjectName}-ArtifactBucketName

  GitHubConnectionArn:
    Value: !Ref GitHubConnection
    Description: Authorise this connection in the AWS Console before the pipeline can run
